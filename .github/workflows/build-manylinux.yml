name: build-manylinux

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g., 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare_release:
    runs-on: ubuntu-22.04
    steps:
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release/v${{ inputs.version }}
          name: BUDDY MLIR ${{ inputs.version }}
          draft: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  wheel:
    needs: prepare_release
    name: Build (${{ matrix.arch }}, py${{ matrix.python }})
    timeout-minutes: 360
    continue-on-error: false

    concurrency:
      group: buddy-mlir-manylinux-${{ matrix.arch }}-py${{ matrix.python }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        arch: [x64, riscv64]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:
          - arch: riscv64
            python: "3.10"
          - arch: riscv64
            python: "3.11"
        include:
          - arch: x64
            target_arch: x86_64
          - arch: riscv64
            target_arch: riscv64

    runs-on:
      - self-hosted-docker
      - ${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'false'

      - name: Prepare variables
        id: vars
        run: |
          set -euo pipefail
          PY_VER="${{ matrix.python }}"
          PY_NODOT="${PY_VER//./}"
          PY_TAG="cp${PY_NODOT}-cp${PY_NODOT}"
          BUDDY_HASH="$(git rev-parse HEAD)"
          echo "py_tag=${PY_TAG}" >> "$GITHUB_OUTPUT"
          echo "buddy_hash=${BUDDY_HASH}" >> "$GITHUB_OUTPUT"
          echo "host_build_dir=$HOME/actions-runner/workspace/buddy-mlir-release" >> "$GITHUB_OUTPUT"
          echo "llvm_src=$HOME/actions-runner/workspace/llvm-project" >> "$GITHUB_OUTPUT"

      - name: Checkout LLVM source
        id: setup-llvm
        uses: ./.github/actions/checkout_llvm
        with:
          llvm-src: ${{ steps.vars.outputs.llvm_src }}

      - name: Build manylinux wheel in container
        run: |
          set -euo pipefail
          LLVM_BUILD_DIR="${{ steps.vars.outputs.host_build_dir }}/${{ matrix.target_arch }}/llvm/${{ steps.vars.outputs.py_tag }}/${{ steps.setup-llvm.outputs.cache_hash }}"
          if [ -f "${LLVM_BUILD_DIR}/.manylinux-llvm-ready" ]; then
            export LLVM_CACHE_HIT=true
          else
            # Will remove old dir in container
            export LLVM_CACHE_HIT=false
          fi
          export LLVM_HASH="${{ steps.setup-llvm.outputs.cache_hash }}"
          export HOST_LLVM_SRC="${{ steps.setup-llvm.outputs.llvm_src }}"
          export HOST_BUILD_DIR="${{ steps.vars.outputs.host_build_dir }}"
          ./scripts/release_wheel_manylinux.sh "${{ steps.vars.outputs.py_tag }}" ${{ inputs.version }} "${{ matrix.target_arch }}"

      - name: Upload release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "release/v${{ inputs.version }}" \
            ${{ steps.vars.outputs.host_build_dir }}/${{ matrix.target_arch }}/buddy/${{ steps.vars.outputs.py_tag }}/${{ steps.vars.outputs.buddy_hash }}/target/buddy-${{ inputs.version }}-${{ steps.vars.outputs.py_tag }}-manylinux* \
            --clobber

      - name: Upload buddy-cli
        if: ${{ (matrix.target_arch == 'x86_64' && matrix.python == '3.10') || (matrix.target_arch == 'riscv64' && matrix.python == '3.12') }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUDDY_BUILD_DIR=${{ steps.vars.outputs.host_build_dir }}/${{ matrix.target_arch }}/buddy/${{ steps.vars.outputs.py_tag }}/${{ steps.vars.outputs.buddy_hash }}
          cp -a "${BUDDY_BUILD_DIR}/dist/bin/buddy-cli" "${BUDDY_BUILD_DIR}/target/buddy-cli-${{ inputs.version }}.${{ matrix.target_arch }}"
          gh release upload "release/v${{ inputs.version }}" \
            "${BUDDY_BUILD_DIR}/target/buddy-cli-${{ inputs.version }}.${{ matrix.target_arch }}" \
            --clobber
