name: build-manylinux

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g., 0.1.0)"
        required: true
        type: string
      llvm_cache_mode:
        description: "LLVM cache mode: cache reuses a ready install, incremental keeps the build dir, clean deletes it first."
        required: false
        default: incremental
        type: choice
        options:
          - cache
          - incremental
          - clean
  schedule:
    - cron: '30 18 * * 0'

permissions:
  contents: write

jobs:
  prepare_release:
    runs-on: ubuntu-22.04
    outputs:
      tag_name: ${{ steps.vars.outputs.tag_name }}
      name: ${{ steps.vars.outputs.name }}
      version: ${{ steps.vars.outputs.version }}
      llvm_cache_mode: ${{ steps.vars.outputs.llvm_cache_mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare variables
        id: vars
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # trigger by hand
            VERSION="${{ inputs.version }}"
            NAME="BUDDY MLIR ${VERSION}"
            TAG_NAME="release/v${VERSION}"
            CACHE_MODE="${{ inputs.llvm_cache_mode }}"
          else
            # trigger by schedule
            DATE=$(date +'%Y-%m-%d')
            SHA=$(git rev-parse --short=7 HEAD)
            NAME="Nightly ${DATE}-${SHA}"
            TAG_NAME="nightly"
            CACHE_MODE="incremental"
            if RAW_DESCRIBE=$(git describe --tags --long --match "release/v*" 2>/dev/null); then
              echo "Found last release tag: ${RAW_DESCRIBE}"
              VERSION=$(echo "$RAW_DESCRIBE" | sed -E 's/^release\/v//; s/-([0-9]+)-g/.dev\1+/')
            else
              TOTAL_COMMITS=$(git rev-list --count HEAD)
              VERSION="0.0.0.dev${TOTAL_COMMITS}+${SHA}"
            fi
          fi
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "llvm_cache_mode=$CACHE_MODE" >> "$GITHUB_OUTPUT"

      - name: Create or Update release page
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          name: ${{ steps.vars.outputs.name }}
          draft: ${{ steps.vars.outputs.tag_name != 'nightly' }}
          append_body: false
          overwrite_files: true
          prerelease: ${{ steps.vars.outputs.tag_name == 'nightly' }}
          make_latest: ${{ steps.vars.outputs.tag_name != 'nightly' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  wheel:
    needs: prepare_release
    name: Build (${{ matrix.arch }}, py${{ matrix.python }})
    timeout-minutes: 360
    continue-on-error: false

    concurrency:
      group: buddy-mlir-manylinux-${{ matrix.arch }}-py${{ matrix.python }}-${{ needs.prepare_release.outputs.tag_name }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        arch: [x64, riscv64]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - arch: x64
            target_arch: x86_64
          - arch: riscv64
            target_arch: riscv64

    runs-on:
      - self-hosted-docker
      - ${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'false'

      - name: Prepare variables
        id: vars
        run: |
          set -euo pipefail
          PY_VER="${{ matrix.python }}"
          PY_NODOT="${PY_VER//./}"
          PY_TAG="cp${PY_NODOT}-cp${PY_NODOT}"
          BUDDY_HASH="$(git rev-parse HEAD)"
          echo "py_tag=${PY_TAG}" >> "$GITHUB_OUTPUT"
          echo "buddy_hash=${BUDDY_HASH}" >> "$GITHUB_OUTPUT"
          if [[ "${{ matrix.target_arch }}" == "riscv64" ]]; then
            echo "host_build_dir=/data/runner/workspace/buddy-mlir-release" >> "$GITHUB_OUTPUT"
            echo "llvm_src=/data/runner/workspace/llvm-project" >> "$GITHUB_OUTPUT"
          else
            echo "host_build_dir=$HOME/actions-runner/workspace/buddy-mlir-release" >> "$GITHUB_OUTPUT"
            echo "llvm_src=$HOME/actions-runner/workspace/llvm-project" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout LLVM source
        id: setup-llvm
        uses: ./.github/actions/checkout_llvm
        with:
          llvm-src: ${{ steps.vars.outputs.llvm_src }}

      - name: Build manylinux wheel in container
        run: |
          set -euo pipefail
          export LLVM_CACHE_MODE="${{ needs.prepare_release.outputs.llvm_cache_mode }}"
          export HOST_LLVM_SRC="${{ steps.vars.outputs.llvm_src }}"
          export HOST_BUILD_DIR="${{ steps.vars.outputs.host_build_dir }}"
          ./scripts/release.sh "${{ steps.vars.outputs.py_tag }}" "${{ needs.prepare_release.outputs.version }}" "${{ matrix.target_arch }}"

      - name: Upload release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${{ needs.prepare_release.outputs.tag_name }}" \
            ${{ steps.vars.outputs.host_build_dir }}/${{ matrix.target_arch }}/buddy/${{ steps.vars.outputs.py_tag }}/${{ steps.vars.outputs.buddy_hash }}/target/buddy-${{ needs.prepare_release.outputs.version }}-${{ steps.vars.outputs.py_tag }}-manylinux* \
            ${{ steps.vars.outputs.host_build_dir }}/${{ matrix.target_arch }}/buddy/${{ steps.vars.outputs.py_tag }}/${{ steps.vars.outputs.buddy_hash }}/target/llvm-*-${{ steps.vars.outputs.py_tag }}-manylinux* \
            --clobber

      - name: Upload buddy-cli
        if: ${{ (matrix.target_arch == 'x86_64' && matrix.python == '3.10') || (matrix.target_arch == 'riscv64' && matrix.python == '3.12') }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BUDDY_BUILD_DIR=${{ steps.vars.outputs.host_build_dir }}/${{ matrix.target_arch }}/buddy/${{ steps.vars.outputs.py_tag }}/${{ steps.vars.outputs.buddy_hash }}
          cp -a "${BUDDY_BUILD_DIR}/dist/bin/buddy-cli" "${BUDDY_BUILD_DIR}/target/buddy-cli-${{ needs.prepare_release.outputs.version }}.${{ matrix.target_arch }}"
          gh release upload "${{ needs.prepare_release.outputs.tag_name }}" \
            "${BUDDY_BUILD_DIR}/target/buddy-cli-${{ needs.prepare_release.outputs.version }}.${{ matrix.target_arch }}" \
            --clobber
