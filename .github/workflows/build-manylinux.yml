name: build-manylinux

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g., v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  wheel:
    runs-on: ${{ matrix.target_arch == 'x86_64' && 'ubuntu-22.04' || 'self-host' }}
    strategy:
      fail-fast: false
      matrix:
        target_arch: [x86_64, riscv64]
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Record LLVM submodule commit
        id: llvm_rev
        run: echo "sha=$(git -C llvm rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache LLVM build tree
        id: cache-llvm-build
        uses: actions/cache@v4
        with:
          path: llvm/build-docker/${{ matrix.target_arch }}
          key: llvm-${{ runner.os }}-${{ matrix.target_arch }}-${{ matrix.python }}-${{ steps.llvm_rev.outputs.sha }}

      - name: Build manylinux wheel in container
        run: |
          set -euo pipefail
          PY_VER="${{ matrix.python }}"
          PY_NODOT="${PY_VER//./}"
          PY_TAG="cp${PY_NODOT}-cp${PY_NODOT}"
          export LLVM_CACHE_HIT="${{ steps.cache-llvm-build.outputs.cache-hit }}"
          ./scripts/release_wheel_manylinux.sh "${PY_TAG}" "${{ matrix.target_arch }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target_arch }}-py${{ matrix.python }}
          path: |
            build-docker/${{ matrix.target_arch }}/*/target/*manylinux*.whl
            build-docker/${{ matrix.target_arch }}/*/target/*.tar.gz

  release:
    needs: wheel
    runs-on: ubuntu-22.04
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/wheels
          merge-multiple: true

      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          overwrite_files: true
          files: |
            dist/wheels/*manylinux*.whl
            dist/wheels/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
