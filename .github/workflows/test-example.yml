name: test-examples

on:
  workflow_dispatch:
    inputs:
      source_repository:
        description: Repository containing the code to test.
        required: false
        default: ""
      source_ref:
        description: Branch or tag used to fetch the code under test.
        required: false
        default: ""
      source_sha:
        description: Exact commit SHA to test.
        required: false
        default: ""
      status_api_path:
        description: REST API path used to update the PR commit status.
        required: false
        default: ""
      status_context:
        description: Commit status prefix used for per-matrix checks during manual runs.
        required: false
        default: "test-examples"

permissions:
  contents: read
  statuses: write

jobs:
  test:
    name: Example Test (${{ matrix.os }}-${{ matrix.arch }}-py${{ matrix.python }})
    timeout-minutes: 360
    env:
      CHECKOUT_REPOSITORY: ${{ inputs.source_repository || github.repository }}
      CHECKOUT_FETCH_REF: ${{ inputs.source_ref || github.ref_name }}
      CHECKOUT_REF: ${{ inputs.source_sha || github.sha }}
      STATUS_API_PATH: ${{ inputs.status_api_path }}
      # Speedup hf download
      HF_ENDPOINT: https://hf-mirror.com

    concurrency:
      group: ${{ github.workflow }}-${{ github.event.number || github.ref }}-${{ matrix.os }}-${{ matrix.arch }}-py${{ matrix.python }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64, riscv64]
        python: ["3.12"]
        include:
          - arch: x64
            os: linux
            llvm_src: "$HOME/actions-runner/workspace/llvm-project"
            llvm_build_root: "$HOME/actions-runner/workspace/llvm-cache"
          - arch: arm64
            os: macos
            llvm_src: "$HOME/actions-runner/workspace/llvm-project"
            llvm_build_root: "$HOME/actions-runner/workspace/llvm-cache"
          - arch: riscv64
            os: linux
            llvm_src: "$HOME/src/llvm-project"
            llvm_build_root: "$HOME/llvm-cache"

    runs-on:
      - self-hosted
      - ${{ matrix.arch }}

    steps:
      - name: Mark example tests in progress
        if: ${{ env.STATUS_API_PATH != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MATRIX_STATUS_CONTEXT: ${{ format('{0} ({1}-{2})', inputs.status_context || 'test-examples', matrix.os, matrix.arch) }}
        run: |
          gh api --method POST "$STATUS_API_PATH" \
            -f state='pending' \
            -f context="$MATRIX_STATUS_CONTEXT" \
            -f description='Example tests are running' \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Print target
        run: |
          echo "Building on ${{ matrix.arch }}"
          echo "Python: ${{ matrix.python }}"
          echo "Repository: $CHECKOUT_REPOSITORY"
          echo "Fetch ref: $CHECKOUT_FETCH_REF"
          echo "Commit: $CHECKOUT_REF"
          echo "------ uname ------"
          uname -a

      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ env.CHECKOUT_REPOSITORY }}
          ref: ${{ env.CHECKOUT_REF }}
          submodules: 'false'
          fetch-depth: 300

      - name: Checkout LLVM submodule
        uses: ./.github/actions/checkout_llvm
        with:
          llvm-src: ${{ matrix.llvm_src }}

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1
        with:
          python-version: ${{ matrix.python }}
          activate-environment: "true"
          no-project: "true"
          enable-cache: "true"
          cache-dependency-glob: requirements.txt

      - name: Build buddy-mlir
        continue-on-error: ${{ matrix.arch == 'arm64' }}
        uses: ./.github/actions/ci-common
        with:
          arch: ${{ matrix.arch }}
          llvm-src: ${{ matrix.llvm_src }}
          llvm-build-root: ${{ matrix.llvm_build_root }}

      - name: Run example tests
        continue-on-error: ${{ matrix.arch == 'arm64' }}
        run: |
          bash .github/scripts/test_examples.sh "${{ matrix.arch }}"

      - name: Report matrix status
        if: ${{ always() && env.STATUS_API_PATH != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          MATRIX_STATUS_CONTEXT: ${{ format('{0} ({1}-{2})', inputs.status_context || 'test-examples', matrix.os, matrix.arch) }}
        run: |
          state='error'
          description='Example tests did not complete'

          case "$JOB_STATUS" in
            success)
              state='success'
              description='Example tests passed'
              ;;
            failure)
              state='failure'
              description='Example tests failed'
              ;;
            cancelled)
              description='Example tests were cancelled'
              ;;
          esac

          gh api --method POST "$STATUS_API_PATH" \
            -f state="$state" \
            -f context="$MATRIX_STATUS_CONTEXT" \
            -f description="$description" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
