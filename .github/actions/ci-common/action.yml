name: buddy-mlir build
description: Prepare the environment and build buddy-mlir.

inputs:
  arch:
    description: Target runner architecture.
    required: true
  python-version:
    description: Python version used to create the uv virtual environment.
    required: true
  llvm-src:
    description: Path to the llvm-project checkout.
    required: true
  llvm-build-root:
    description: Path to the LLVM build cache root.
    required: true

runs:
  using: composite
  steps:
    - name: Prepare LLVM variables
      shell: bash
      run: |
        set -euo pipefail

        py_tag="py${{ inputs.python-version }}"
        py_tag="${py_tag//./}"
        llvm_build_dir="${{ inputs.llvm-build-root }}/${{ inputs.arch }}/llvm/${py_tag}/$(git -C "${{ inputs.llvm-src }}" rev-parse HEAD)"

        echo "LLVM_BUILD_DIR=${llvm_build_dir}" >> "$GITHUB_ENV"
        if [ -f "${llvm_build_dir}/.ci-llvm-ready" ]; then
          echo "LLVM_CACHE_HIT=true" >> "$GITHUB_ENV"
        else
          echo "LLVM_CACHE_HIT=false" >> "$GITHUB_ENV"
        fi

    - name: Install uv
      uses: astral-sh/setup-uv@v8
      with:
        version: "0.11.23"
        python-version: ${{ inputs.python-version }}
        activate-environment: "true"
        venv-path: .venv
        no-project: "true"
        enable-cache: "true"
        cache-dependency-glob: requirements.txt

    - name: Prepare ENV (x64)
      if: ${{ inputs.arch == 'x64' }}
      shell: bash
      run: |
        export PATH="/usr/lib/ccache:$PATH"
        echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
        echo "/usr/lib/ccache" >> "$GITHUB_PATH"
        ccache -M 50G
        echo "CCACHE_MAXSIZE=50G" >> $GITHUB_ENV

        uv pip install --torch-backend cpu -r requirements.txt

    - name: Prepare ENV (arm64)
      if: ${{ inputs.arch == 'arm64' }}
      shell: bash
      run: |
        export PATH="/opt/homebrew/opt/ccache/libexec:$PATH"
        echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
        echo "/opt/homebrew/opt/ccache/libexec" >> "$GITHUB_PATH"
        ccache -M 50G
        echo "CCACHE_MAXSIZE=50G" >> $GITHUB_ENV

        uv pip install --torch-backend cpu -r requirements.txt

    - name: Prepare ENV (riscv64)
      if: ${{ inputs.arch == 'riscv64' }}
      shell: bash
      run: |
        export PATH="/usr/lib/ccache:$PATH"
        echo "CCACHE_DIR=/home/jenkins/.ccache" >> $GITHUB_ENV
        echo "/usr/lib/ccache" >> "$GITHUB_PATH"
        ccache -M 50G
        echo "CCACHE_MAXSIZE=50G" >> $GITHUB_ENV

        uv pip install -U pip setuptools wheel packaging
        uv pip install --index-strategy unsafe-best-match -r requirements.txt

    - name: Configure and Build LLVM
      if: ${{ env.LLVM_CACHE_HIT != 'true' }}
      shell: bash
      run: |
        mkdir -p "$LLVM_BUILD_DIR"

        RUNTIMES_CMAKE_ARGS=()
        RUNTIMES_CMAKE_ARGS_VALUE=""
        if [ "${{ inputs.arch }}" = "riscv64" ]; then
          GCC_INSTALL_DIR="$(dirname "$(g++ -print-libgcc-file-name)")"

          RUNTIMES_CMAKE_ARGS_VALUE="-DCMAKE_C_FLAGS=--gcc-install-dir=${GCC_INSTALL_DIR}"
          RUNTIMES_CMAKE_ARGS_VALUE="${RUNTIMES_CMAKE_ARGS_VALUE};-DCMAKE_CXX_FLAGS=--gcc-install-dir=${GCC_INSTALL_DIR}"
          RUNTIMES_CMAKE_ARGS_VALUE="${RUNTIMES_CMAKE_ARGS_VALUE};-DCMAKE_HAVE_LIBC_PTHREAD=TRUE"
          RUNTIMES_CMAKE_ARGS_VALUE="${RUNTIMES_CMAKE_ARGS_VALUE};-DCMAKE_USE_PTHREADS_INIT=TRUE"
          RUNTIMES_CMAKE_ARGS_VALUE="${RUNTIMES_CMAKE_ARGS_VALUE};-DCMAKE_THREAD_LIBS_INIT="
        fi
        if [ -n "${RUNTIMES_CMAKE_ARGS_VALUE}" ]; then
          RUNTIMES_CMAKE_ARGS=(-DRUNTIMES_CMAKE_ARGS="${RUNTIMES_CMAKE_ARGS_VALUE}")
        fi

        cmake -G Ninja -S "${{ inputs.llvm-src }}/llvm" -B "$LLVM_BUILD_DIR" \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          "${RUNTIMES_CMAKE_ARGS[@]}" \
          -DLLVM_ENABLE_PROJECTS="mlir;clang" \
          -DLLVM_ENABLE_RUNTIMES="openmp" \
          -DLLVM_TARGETS_TO_BUILD="host;RISCV" \
          -DLLVM_ENABLE_ASSERTIONS=ON \
          -DCMAKE_BUILD_TYPE=RELEASE \
          -DMLIR_ENABLE_BINDINGS_PYTHON=ON \
          -DPython3_EXECUTABLE="$(which python)" \
          -DPython_EXECUTABLE="$(which python)"

        ccache -z
        ninja -C "$LLVM_BUILD_DIR" check-clang check-mlir check-openmp mlir-libraries
        ccache -s
        printf 'ready\n' > "$LLVM_BUILD_DIR/.ci-llvm-ready"

        llvm_cache_dir="$(dirname "$LLVM_BUILD_DIR")"
        if [ -d "$llvm_cache_dir" ]; then
          (
            cd "$llvm_cache_dir"
            old_cache_entries="$(ls -1dt */ 2>/dev/null | tail -n +3 || true)"
            if [ -n "$old_cache_entries" ]; then
              printf '%s\n' "$old_cache_entries" | xargs rm -rf
            fi
          )
        fi

    - name: Configure and Build buddy-mlir
      shell: bash
      run: |
        echo "---- CHECK LOCAL SUBMODULE ----"
        ls -l llvm || true
        git submodule status || true
        rm -rf build

        cmake -G Ninja -S . -B build \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DMLIR_DIR=$LLVM_BUILD_DIR/lib/cmake/mlir \
          -DLLVM_DIR=$LLVM_BUILD_DIR/lib/cmake/llvm \
          -DLLVM_ENABLE_ASSERTIONS=ON \
          -DCMAKE_BUILD_TYPE=RELEASE \
          -DBUDDY_MLIR_ENABLE_PYTHON_PACKAGES=ON \
          -DBUDDY_BUILD_DEEPSEEK_R1_MODEL=OFF \
          -DPython3_EXECUTABLE="$(which python)" \
          -DPython_EXECUTABLE="$(which python)"

        ccache -z
        ninja -C build
        ccache -s
