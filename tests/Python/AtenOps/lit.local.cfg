# -*- Python -*-
#
# This directory contains python lit tests plus helper tooling. Exclude helper
# scripts from lit discovery.
#

for name in [
    "run_numeric.py",
]:
    config.excludes.add(name)

# Each test imports PyTorch + torch._dynamo which is very memory-intensive.
# Running too many in parallel causes InternalTorchDynamoError crashes.
# Use the "pytorch" parallelism group defined in lit.cfg.py to cap concurrency.
config.parallelism_group = "pytorch"
